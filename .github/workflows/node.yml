name: Node.js CI

on:
  push:
   branches: [master]
  pull_request:
   branches: [master]

jobs:
  build:
   runs-on: ubuntu-latest

  steps:
   -name: Checkout code
   uses: actions/checkout@v3

   -name: Setup Node.js
   uses: actions/setup-node@v3
   with:
    node-version:'18'

   -name: Install dependencies
   uses: npm install
   
   -name: run test
   uses: npm test
    
